name: Create pre-release

on:
  workflow_call:
    inputs:
      systemId:
        required: true
        type: string
      publicApiUrl:
        required: true
        type: string
      publicApiPort:
        required: true
        type: string
      publicDeployPort:
        required: true
        type: string
      client:
        required: true
        type: string
      username:
        required: true
        type: string
      trTarget:
        required: true
        type: string
      devclass:
        required: true
        type: string
      dest:
        required: true
        type: string
      asHost:
        required: true
        type: string
      sysNr:
        required: true
        type: string
      sapRouter:
        required: false
        type: string
      lang:
        required: true
        type: string
      skipDependencies:
        required: false
        type: boolean
      releaseTimeout:
        required: false
        type: string
      manifestPath:
        required: false
        type: string
        default: './repo/manifest.json'
      fioriRoot:
        required: false
        type: string
        default: './repo/app'
      abapSrcFolder:
        required: false
        type: string
        default: 'src'
      abapSrcAlign:
        required: false
        type: boolean
        default: false
      abapSrcAlignBranch:
        required: false
        type: string
        default: 'master'

jobs:
  listFioriApps:
    name: List Fiori apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.listFolders.outputs.jsonMatrix }}
    steps:
      - uses: actions/download-artifact@master
        with:
          name: checkout
          path: ./

      - name: Unzip checkout
        run: unzip checkout.zip

      - name: List fiori apps
        id: listFolders
        uses: ./actions/regesta/booster/getFioriMatrix
        with:
          appFolderPath: ${{ inputs.fioriRoot }}

  deployFioriApps:
    name: Deploy Fiori app
    needs: listFioriApps
    if: ${{ needs.listFioriApps.outputs.matrix != '[]' }}
    runs-on: [self-hosted, Windows, RegRunner]
    strategy:
      matrix:
        path: ${{ fromJson(needs.listFioriApps.outputs.matrix) }}
    steps:
      - uses: actions/download-artifact@master
        with:
          name: checkout
          path: ./

      - name: Unzip checkout
        run: tar -xf checkout.zip
        shell: cmd

      - name: Deploy fiori app
        uses: ./actions/regesta/booster/deployFioriApp
        with:
          pathToApp: ${{ matrix.path }}
          apiEndpoint: ${{ inputs.publicApiUrl }}:${{ inputs.publicApiPort }}/sap/zregboosterwkf
          deployEndpoint: ${{ inputs.publicApiUrl }}:${{ inputs.publicDeployPort }}
          client: ${{ inputs.client }}
          username: ${{ inputs.username }}
          password: ${{ secrets[format('{0}_PASSWORD', inputs.systemId)] }}
          createTrkorrTarget: ${{ inputs.trTarget }}
          createTrkorrText: 'Github actions generated for deploy'

  abapSrc:
    name: Align ABAP source code to ${{ inputs.abapSrcAlignBranch }}
    needs: deployFioriApps
    if: ${{ inputs.abapSrcAlign && always() && !failure() && !cancelled() }}
    runs-on: [self-hosted, Windows, RegRunner]
    steps:
      - name: Download checkout artifact
        uses: actions/download-artifact@v4
        with:
          name: checkout
          path: ./artifact

      - name: Extract checkout artifact
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path "./artifact/checkout.zip")) {
            throw "Artifact ./artifact/checkout.zip not found"
          }

          if (Test-Path "./repo") {
            Remove-Item "./repo" -Recurse -Force
          }

          Expand-Archive -Path "./artifact/checkout.zip" -DestinationPath "." -Force

          if (-not (Test-Path "./repo")) {
            throw "Expected ./repo after extracting checkout.zip, but it was not found"
          }

          Write-Host "Repo root content:"
          Get-ChildItem -Force ./repo

      - name: Download ABAP source zip
        shell: bash
        env:
          USER: ${{ inputs.username }}
          PASS: ${{ secrets[format('{0}_PASSWORD', inputs.systemId)] }}
          PUBLIC_API_URL: ${{ inputs.publicApiUrl }}
          PUBLIC_API_PORT: ${{ inputs.publicApiPort }}
          CLIENT: ${{ inputs.client }}
          DEVCLASS: ${{ inputs.devclass }}
        run: |
          set -euo pipefail
      
          ENDPOINT="${PUBLIC_API_URL%/}"
      
          if [ -n "${PUBLIC_API_PORT:-}" ]; then
            ENDPOINT="${ENDPOINT}:${PUBLIC_API_PORT}"
          fi
      
          URI="${ENDPOINT}/sap/zregboosterwkf/src?sap-client=${CLIENT}&package=${DEVCLASS}"
      
          rm -rf ./abap
          mkdir -p ./abap
      
          echo "Trying URI: $URI"
      
          if ! curl -k -L --http1.1 --ssl-no-revoke \
            -u "${USER}:${PASS}" \
            "$URI" \
            --output "./abap/abap.zip"; then
      
            echo "HTTPS failed. Retrying with HTTP..."
      
            URI_HTTP="${URI/https:\/\//http://}"
      
            echo "Trying URI: $URI_HTTP"
      
            curl -L --http1.1 \
              -u "${USER}:${PASS}" \
              "$URI_HTTP" \
              --output "./abap/abap.zip"
          fi

      - name: Extract ABAP source zip
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Expand-Archive -Path "./abap/abap.zip" -DestinationPath "./abap/extracted" -Force
          Remove-Item "./abap/abap.zip" -Force

          if (-not (Test-Path "./abap/extracted/src")) {
            throw "Expected ./abap/extracted/src after extracting ABAP source zip, but it was not found"
          }

          Get-ChildItem -Force ./abap/extracted
          Get-ChildItem -Force ./abap/extracted/src

      - name: Replace repo ABAP sources
        shell: powershell
        env:
          ABAP_SRC_FOLDER: ${{ inputs.abapSrcFolder }}
        run: |
          $ErrorActionPreference = "Stop"
      
          $abapSrcFolder = $env:ABAP_SRC_FOLDER
          if ([string]::IsNullOrWhiteSpace($abapSrcFolder)) {
            $abapSrcFolder = "src"
          }
      
          $repoAbapPath = "./repo/$abapSrcFolder"
      
          if (Test-Path $repoAbapPath) {
            Remove-Item $repoAbapPath -Recurse -Force
          }
      
          New-Item -ItemType Directory -Path $repoAbapPath -Force | Out-Null
      
          Copy-Item "./abap/extracted/src/*" $repoAbapPath -Recurse -Force
          
      - name: Commit & Push changes
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          BRANCH: ${{ inputs.abapSrcAlignBranch }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
      
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw "CI_GITHUB_TOKEN is empty"
          }
      
          cd ./repo
      
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          git add .
      
          if ((git status --porcelain).Length -eq 0) {
            Write-Host "No changes to commit."
            exit 0
          }
      
          git commit -m "Update ABAP sources [skip ci]"
      
          $authUrl = "https://x-access-token:$($env:GH_TOKEN)@github.com/$($env:REPOSITORY).git"
      
          git remote remove origin 2>$null
          git remote add origin $authUrl
      
          git push origin "HEAD:$($env:BRANCH)"
         
  trmPublish:
    name: TRM Publish (Release candidate)
    needs:
      - deployFioriApps
      - abapSrc
    if: ${{ always() && !failure() && !cancelled() && (!inputs.abapSrcAlign || needs.abapSrc.result == 'success') }}
    runs-on: [self-hosted, Windows, RegRunner]
    steps:
      - uses: actions/download-artifact@master
        with:
          name: checkout
          path: ./

      - name: Unzip checkout
        run: tar -xf checkout.zip
        shell: cmd

      - name: TRM Publish (Release candidate)
        uses: ./actions/regesta/booster/publishTrm
        with:
          preRelease: true
          tags: rc
          token: ${{ secrets.TRM_TOKEN }}
          devclass: ${{ inputs.devclass }}
          dest: ${{ inputs.dest }}
          asHost: ${{ inputs.asHost }}
          sysNr: ${{ inputs.sysNr }}
          sapRouter: ${{ inputs.sapRouter }}
          client: ${{ inputs.client }}
          lang: ${{ inputs.lang }}
          user: ${{ inputs.username }}
          password: ${{ secrets[format('{0}_PASSWORD', inputs.systemId)] }}
          trTarget: ${{ inputs.trTarget }}
          manifestPath: ${{ inputs.manifestPath }}
          skipDependencies: ${{ inputs.skipDependencies }}
          releaseTimeout: ${{ inputs.releaseTimeout }}

  createPreRelease:
    name: Create Github pre-release
    runs-on: ubuntu-latest
    needs: trmPublish
    if: ${{ always() && !failure() && !cancelled() }}
    steps:
      - uses: actions/download-artifact@master
        with:
          name: checkout
          path: ./

      - name: Unzip checkout
        run: unzip checkout.zip

      - name: Create pre-release
        uses: ./actions/regesta/booster/createPreRelease
        id: createPreRelease
        with:
          manifestPath: ${{ inputs.manifestPath }}
